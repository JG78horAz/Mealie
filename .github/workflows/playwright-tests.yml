name: Playwright Tests

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main
  workflow_dispatch:

jobs:
  playwright:
    name: Docker + Playwright
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: playwright-tests/package-lock.json

      - name: Start Mealie with Docker Compose
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml up -d --build

      - name: Wait for Mealie
        run: |
          for i in {1..90}; do
            if curl -fsS http://localhost:9091 >/dev/null; then
              exit 0
            fi
            sleep 2
          done

          docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml logs
          exit 1

      - name: Create Playwright test user
        run: |
          admin_token=$(curl -sS \
            -X POST http://localhost:9091/api/auth/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "username=changeme@example.com&password=MyPassword" \
            | python3 -c "import json, sys; print(json.load(sys.stdin)['access_token'])")

          response_code=$(curl -sS -o /tmp/register-response.json -w "%{http_code}" \
            -X POST http://localhost:9091/api/admin/users \
            -H "Authorization: Bearer ${admin_token}" \
            -H "Content-Type: application/json" \
            --data '{
              "email": "test@example.com",
              "username": "test",
              "fullName": "Test User",
              "password": "Test1234!",
              "group": "Home",
              "household": "Family",
              "admin": false,
              "advanced": true,
              "canInvite": true,
              "canManage": true,
              "canManageHousehold": true,
              "canOrganize": true
            }')

          if [ "$response_code" != "201" ] && [ "$response_code" != "409" ]; then
            cat /tmp/register-response.json
            exit 1
          fi

      - name: Verify test user login
        run: |
          response_code=$(curl -sS -o /tmp/login-response.json -w "%{http_code}" \
            -X POST http://localhost:9091/api/auth/token \
            -H "Content-Type: application/x-www-form-urlencoded" \
            --data "username=test@example.com&password=Test1234!")

          if [ "$response_code" != "200" ]; then
            cat /tmp/login-response.json
            exit 1
          fi

      - name: Install frontend dependencies
        working-directory: frontend
        run: |
          corepack enable
          corepack prepare yarn@1.22.22 --activate
          yarn install --frozen-lockfile

      - name: Install Playwright test dependencies
        working-directory: playwright-tests
        run: npm ci

      - name: Install Chromium
        working-directory: playwright-tests
        run: npx playwright install --with-deps chromium

      - name: Run Playwright tests
        working-directory: playwright-tests
        run: npx playwright test

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: playwright-tests/playwright-report/
          if-no-files-found: ignore

      - name: Upload Playwright test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-test-results
          path: playwright-tests/test-results/
          if-no-files-found: ignore

      - name: Stop Docker Compose
        if: always()
        run: docker compose -f docker/docker-compose.yml -f docker/docker-compose.ci.yml down -v
